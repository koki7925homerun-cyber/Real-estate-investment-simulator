<script>
/* ===================== テーマ ===================== */
const C = {
  page: "#E7E8EA", card: "#FBFBFC", ink: "#1E212A", soft: "#666C76",
  faint: "#99A0A8", border: "#DEDFE2", grid: "#ECEDEF",
  steel: "#2B4A78", steelSoft: "#5E7CA6", teal: "#2F7368",
  gold: "#A9792F", red: "#BC4A2E",
};
const FONT = '"Hiragino Sans","Noto Sans JP","Yu Gothic",Meiryo,system-ui,sans-serif';
const RC_LEGAL = 47;

/* ===================== フォーマッタ ===================== */
const yen = (v) => Math.round(v);
const fMan = (v) => (v / 1e4).toLocaleString(undefined, { maximumFractionDigits: 1 }) + "万";
const fYen = (v) => {
  const a = Math.abs(v);
  if (a >= 1e8) return (v / 1e8).toFixed(2) + "億円";
  return Math.round(v / 1e4).toLocaleString() + "万円";
};
const fPct = (x, d = 1) => (x * 100).toFixed(d) + "%";
const axisTick = (v) => (Math.abs(v) >= 1e8 ? (v / 1e8).toFixed(1) + "億" : Math.round(v / 1e4).toLocaleString());

/* ===================== IRR ===================== */
function irr(cfs) {
  const npv = (r) => cfs.reduce((a, c, i) => a + c / Math.pow(1 + r, i), 0);
  let lo = -0.9, hi = 1, fLo = npv(lo), fHi = npv(hi), t = 0;
  while (fLo * fHi > 0 && hi < 12 && t < 60) { hi += 0.5; fHi = npv(hi); t++; }
  if (fLo * fHi > 0) return null;
  for (let i = 0; i < 120; i++) {
    const m = (lo + hi) / 2, fM = npv(m);
    if (Math.abs(fM) < 1) return m;
    if (fLo * fM < 0) { hi = m; } else { lo = m; fLo = fM; }
  }
  return (lo + hi) / 2;
}

/* ===================== シミュレーション ===================== */
function simulate(p) {
  const P = p.priceMan * 1e4;
  const B = Math.min(p.buildingMan * 1e4, P);
  const acq = p.acqMan * 1e4;
  const down = Math.min(p.downMan * 1e4, P);
  const L0 = Math.max(0, P - down);
  const equity = down + acq;

  const r = p.rate / 100 / 12;
  const n = p.term * 12;
  const M = L0 > 0 ? (r === 0 ? L0 / n : (L0 * r) / (1 - Math.pow(1 + r, -n))) : 0;
  const monthlyPrincipal = n > 0 ? L0 / n : 0;
  const D = B / RC_LEGAL;

  const opex0 = p.opexMan * 1e4;
  const tax0 = p.taxMan * 1e4;

  const rows = [];
  let loan = L0, accumCF = -acq, accumDep = 0, deadCross = null;
  const stream = [-equity];

  for (let t = 1; t <= p.years; t++) {
    const V = P * Math.pow(1 + p.valueChg / 100, t);
    const rent = p.rentMan * 1e4 * 12 * Math.pow(1 + p.rentChg / 100, t - 1) * (1 - p.vacancy / 100);
    const opexRun = opex0 * Math.pow(1 + p.inflation / 100, t - 1);
    const propTax = tax0 * Math.pow(1 + p.taxChg / 100, t - 1);
    const opex = opexRun + propTax;

    let interest = 0, principal = 0;
    for (let m = 0; m < 12; m++) {
      if (loan <= 0 || t > p.term) break;
      const i = loan * r;
      let pr = p.loanMethod === "gankin" ? monthlyPrincipal : M - i;
      if (pr > loan) pr = loan;
      interest += i; principal += pr; loan -= pr;
    }
    const debt = interest + principal;
    const dep = (p.useDep && t <= RC_LEGAL) ? D : 0;
    accumDep += dep;
    if (p.useDep && deadCross === null && debt > 0 && principal > dep) deadCross = t;

    const taxable = rent - opex - interest - dep;
    const tax = taxable >= 0 ? taxable * (p.incomeTax / 100) : (p.lossOffset ? taxable * (p.incomeTax / 100) : 0);
    const cf = rent - opex - debt - tax;
    accumCF += cf; stream.push(cf);

    const saleCost = V * (p.saleRate / 100);
    const book = P + acq - accumDep;
    const gain = V - saleCost - book;
    const cgRate = t <= 5 ? 0.3963 : 0.20315;
    const cgTax = Math.max(0, gain) * cgRate;
    const saleNet = V - saleCost - loan - cgTax;

    rows.push({
      year: t, V, rent, opex, opexRun, propTax, interest, principal, debt,
      dep, accumDep, taxable, tax, cf, accumCF, loan,
      nwHold: V - loan + accumCF, nwReal: accumCF + saleNet,
      saleCost, book, gain, cgRate, cgTax, saleNet,
    });
  }

  const last = rows[rows.length - 1];
  const s = [...stream]; s[s.length - 1] += last.saleNet;
  const eqIrr = irr(s);
  const y1 = rows[0];
  const grossYield = (p.rentMan * 1e4 * 12) / P;

  return {
    rows, P, B, acq, L0, down, equity, M, monthlyPrincipal, D, opex0, tax0, monthlyRate: r, nMonths: n,
    deadCross, finalHold: last.nwHold, finalReal: last.nwReal,
    multiple: equity > 0 ? last.nwReal / equity : 0, eqIrr, firstCF: y1.cf, grossYield,
  };
}

/* ===================== 既定値 ===================== */
const BASE = {
  priceMan: 6000, buildingMan: 3900, acqMan: 420,
  downMan: 600, rate: 2.0, term: 35,
  rentMan: 30, vacancy: 8, rentChg: -0.7,
  opexMan: 72, inflation: 1.0, taxMan: 50, taxChg: -1.0,
  valueChg: -1.0, years: 35,
  incomeTax: 30, lossOffset: true, saleRate: 4, useDep: false, loanMethod: "ganri",
};

/* ===================== 用語集 ===================== */
const GLOSSARY = [
  ["純資産", "物件の価値から、まだ残っているローンを引いた『あなたの正味の取り分』。これに手元へ貯まった現金を足したもの。このアプリのゴール。"],

      + `<span class="ctrl-val"><input type="number" class="main-num" data-key="${it.key}" value="${v}" step="${it.step}"><em>${it.unit}</em></span></div>`
      + `<input type="range" class="main-range" data-key="${it.key}" min="${it.min}" max="${max}" step="${it.step}" value="${v}">`
      + `<div class="ctrl-hint" data-hint="${it.key}">${hint}</div></div>`;
  }
  function segHTML() {
    return `<div class="ctrl"><div class="ctrl-head"><span class="ctrl-label">返済方法</span></div>`
      + `<div class="seg"><button class="seg-btn${state.loanMethod === "ganri" ? " on" : ""}" data-loan="ganri">元利均等</button>`
      + `<button class="seg-btn${state.loanMethod === "gankin" ? " on" : ""}" data-loan="gankin">元金均等</button></div>`
      + `<div class="ctrl-hint">元利均等＝毎月の支払い合計が一定（最初は利息が多く、だんだん元金が増える）。元金均等＝元金の返済額を一定にする方式で、毎月の支払いは年々下がる。どちらも残債は返済のたびに減ります。</div></div>`;
  }
  function chkHTML(it) {
    return `<div class="ctrl"><label class="switch"><input type="checkbox" class="chk" data-key="${it.chk}" ${state[it.chk] ? "checked" : ""}><span>${it.label}</span></label>`
      + `<div class="ctrl-hint">${it.hint}</div></div>`;
  }
  function controlsHTML() {
    return GROUPS.map((g) => `<div class="group"><div class="group-title"><span>${g.n}</span>${g.t}</div>`
      + g.items.map((it) => it.seg ? segHTML() : it.chk ? chkHTML(it) : ctrlHTML(it)).join("") + `</div>`).join("");
  }

  /* ---------- SVGグラフ ---------- */
  const VW = 720;
  const svg = (vh, inner, defs) => `<svg viewBox="0 0 ${VW} ${vh}" width="100%" height="${vh}" preserveAspectRatio="xMidYMid meet" style="display:block;max-width:100%">${defs || ""}${inner}</svg>`;
  function yGrid(mn, mx, sy, pL, pR, color) {
    let s = "";
    for (let i = 0; i <= 4; i++) {
      const v = mn + (mx - mn) * i / 4, y = sy(v);
      s += `<line x1="${pL}" y1="${y.toFixed(1)}" x2="${pR}" y2="${y.toFixed(1)}" stroke="${C.grid}"/>`;
      s += `<text x="${pL - 6}" y="${(y + 3).toFixed(1)}" text-anchor="end" font-size="11" fill="${color || C.soft}">${axisTick(v)}</text>`;
    }
    return s;
  }
  function xLabels(N, sx, vh) {
    let s = "", step = Math.max(1, Math.ceil(N / 8));
    for (let y = 1; y <= N; y++) if ((y - 1) % step === 0 || y === N)
      s += `<text x="${sx(y).toFixed(1)}" y="${vh - 7}" text-anchor="middle" font-size="11" fill="${C.soft}">${y}</text>`;
    return s;
  }
  function overlay(N, pL, pR, pT, pB) {
    let s = "", w = (pR - pL) / N;
    for (let i = 0; i < N; i++) s += `<rect class="yhit" data-year="${i + 1}" x="${(pL + w * i).toFixed(1)}" y="${pT}" width="${w.toFixed(1)}" height="${pB - pT}" fill="transparent" style="cursor:pointer"/>`;
    return s;
  }
  function vline(x, color, label, pT, pB, dash) {
    return `<line x1="${x.toFixed(1)}" y1="${pT}" x2="${x.toFixed(1)}" y2="${pB}" stroke="${color}" ${dash ? `stroke-dasharray="${dash}"` : ""} stroke-width="1.3"/>`
      + (label ? `<text x="${x.toFixed(1)}" y="${pT - 2}" text-anchor="middle" font-size="10" fill="${color}">${label}</text>` : "");
  }

  function chartNW(tSel) {
    const rows = sim.rows, N = rows.length, vh = 300, pT = 16, pB = vh - 24, pL = 50, pR = VW - 14;
    let mn = 0, mx = 0;
    rows.forEach((r) => { mn = Math.min(mn, r.nwHold, r.nwReal); mx = Math.max(mx, r.nwHold, r.nwReal); });
    const pad = (mx - mn) * 0.08 || 1; mx += pad; mn -= pad;
    const sx = (y) => N <= 1 ? pL : pL + ((y - 1) / (N - 1)) * (pR - pL);
    const sy = (v) => pB - (v - mn) / (mx - mn) * (pB - pT);
    const yb = sy(0);
    let area = `M ${sx(1).toFixed(1)} ${yb.toFixed(1)}`;
    rows.forEach((r) => { area += ` L ${sx(r.year).toFixed(1)} ${sy(r.nwHold).toFixed(1)}`; });
    area += ` L ${sx(N).toFixed(1)} ${yb.toFixed(1)} Z`;
    const line = rows.map((r) => `${sx(r.year).toFixed(1)},${sy(r.nwHold).toFixed(1)}`).join(" ");
    const real = rows.map((r) => `${sx(r.year).toFixed(1)},${sy(r.nwReal).toFixed(1)}`).join(" ");
    const ev = [];
    if (sim.deadCross) ev.push([sim.deadCross, "デッドクロス", C.red]);
    if (state.useDep && RC_LEGAL <= state.years) ev.push([RC_LEGAL, "償却終了", C.gold]);
    if (state.term <= state.years) ev.push([state.term, "完済", C.teal]);
    let inner = yGrid(mn, mx, sy, pL, pR) + xLabels(N, sx, vh);
    inner += `<line x1="${pL}" y1="${yb.toFixed(1)}" x2="${pR}" y2="${yb.toFixed(1)}" stroke="${C.faint}" stroke-dasharray="2 2"/>`;
    inner += `<path d="${area}" fill="url(#gNW)" stroke="none"/>`;
    inner += `<polyline points="${line}" fill="none" stroke="${C.steel}" stroke-width="2.4"/>`;
    inner += `<polyline points="${real}" fill="none" stroke="${C.gold}" stroke-width="2" stroke-dasharray="5 4"/>`;
    ev.forEach((e) => { inner += vline(sx(e[0]), e[2], e[1], pT, pB, "4 3"); });
    inner += vline(sx(tSel), C.steelSoft, tSel + "年", pT, pB);
    inner += overlay(N, pL, pR, pT, pB);
    const defs = `<defs><linearGradient id="gNW" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${C.steel}" stop-opacity="0.26"/><stop offset="100%" stop-color="${C.steel}" stop-opacity="0.02"/></linearGradient></defs>`;
    return svg(vh, inner, defs);
  }

  function chartCF() {
    const rows = sim.rows, N = rows.length, vh = 210, pT = 10, pB = vh - 24, pL = 50, pR = VW - 14;
    let mn = 0, mx = 0; rows.forEach((r) => { mn = Math.min(mn, r.cf); mx = Math.max(mx, r.cf); });
    const pad = (mx - mn) * 0.08 || 1; mx += pad; mn -= pad;
    const slot = (pR - pL) / N, bw = slot * 0.6;
    const sxC = (i) => pL + slot * (i + 0.5);
    const sy = (v) => pB - (v - mn) / (mx - mn) * (pB - pT);
    const yb = sy(0);
    let inner = yGrid(mn, mx, sy, pL, pR) + xLabels(N, (y) => sxC(y - 1), vh);
    inner += `<line x1="${pL}" y1="${yb.toFixed(1)}" x2="${pR}" y2="${yb.toFixed(1)}" stroke="${C.faint}"/>`;
    rows.forEach((r, i) => {
      const y = r.cf >= 0 ? sy(r.cf) : yb, h = Math.abs(sy(r.cf) - yb);
      inner += `<rect x="${(sxC(i) - bw / 2).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0, h).toFixed(1)}" fill="${r.cf >= 0 ? C.teal : C.red}"/>`;
    });
    if (sim.deadCross) inner += vline(sxC(sim.deadCross - 1), C.red, "", pT, pB, "4 3");
    inner += overlay(N, pL, pR, pT, pB);
    return svg(vh, inner);
  }

  function chartLoan() {
    const rows = sim.rows, N = rows.length, vh = 230, pT = 10, pB = vh - 24, pL = 50, pR = VW - 50;
    let leftMax = 1, rightMax = Math.max(sim.L0, 1);
    rows.forEach((r) => { leftMax = Math.max(leftMax, r.principal + r.interest); rightMax = Math.max(rightMax, r.loan); });
    const slot = (pR - pL) / N, bw = slot * 0.6;
    const sxC = (i) => pL + slot * (i + 0.5);
    const syL = (v) => pB - (v / leftMax) * (pB - pT);
    const syR = (v) => pB - (v / rightMax) * (pB - pT);
    let inner = "";
    for (let i = 0; i <= 4; i++) {
      const y = pB - (pB - pT) * i / 4;
      inner += `<line x1="${pL}" y1="${y.toFixed(1)}" x2="${pR}" y2="${y.toFixed(1)}" stroke="${C.grid}"/>`;
      inner += `<text x="${pL - 6}" y="${(y + 3).toFixed(1)}" text-anchor="end" font-size="11" fill="${C.soft}">${axisTick(leftMax * i / 4)}</text>`;
      inner += `<text x="${pR + 6}" y="${(y + 3).toFixed(1)}" text-anchor="start" font-size="11" fill="${C.gold}">${axisTick(rightMax * i / 4)}</text>`;
    }
    inner += xLabels(N, (y) => sxC(y - 1), vh);
    rows.forEach((r, i) => {
      const x = sxC(i) - bw / 2;
      const yp = syL(r.principal), hp = pB - yp;
      inner += `<rect x="${x.toFixed(1)}" y="${yp.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0, hp).toFixed(1)}" fill="${C.steel}"/>`;
      const yi = syL(r.principal + r.interest), hi = yp - yi;
      inner += `<rect x="${x.toFixed(1)}" y="${yi.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0, hi).toFixed(1)}" fill="${C.red}" fill-opacity="0.5"/>`;
    });
    const loanLine = rows.map((r, i) => `${sxC(i).toFixed(1)},${syR(r.loan).toFixed(1)}`).join(" ");
    inner += `<polyline points="${loanLine}" fill="none" stroke="${C.gold}" stroke-width="2.2"/>`;
    inner += overlay(N, pL, pR, pT, pB);
    return svg(vh, inner);
  }

  function chartBS(tSel) {
    const rows = sim.rows, N = rows.length, vh = 210, pT = 10, pB = vh - 24, pL = 50, pR = VW - 14;
    let mx = 1; rows.forEach((r) => { mx = Math.max(mx, r.loan + Math.max(0, r.nwHold)); });
    mx *= 1.05;
    const slot = (pR - pL) / N, bw = slot * 0.62;
    const sxC = (i) => pL + slot * (i + 0.5);
    const sy = (v) => pB - (v / mx) * (pB - pT);
    let inner = "";
    for (let i = 0; i <= 4; i++) {
      const v = mx * i / 4, y = sy(v);
      inner += `<line x1="${pL}" y1="${y.toFixed(1)}" x2="${pR}" y2="${y.toFixed(1)}" stroke="${C.grid}"/>`;
      inner += `<text x="${pL - 6}" y="${(y + 3).toFixed(1)}" text-anchor="end" font-size="11" fill="${C.soft}">${axisTick(v)}</text>`;
    }
    inner += xLabels(N, (y) => sxC(y - 1), vh);
    rows.forEach((r, i) => {
      const x = sxC(i) - bw / 2;
      const yl = sy(r.loan), hl = pB - yl;
      inner += `<rect x="${x.toFixed(1)}" y="${yl.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0, hl).toFixed(1)}" fill="${C.red}" fill-opacity="0.4"/>`;
      const top = sy(r.loan + r.nwHold), yy = Math.min(yl, top), hh = Math.abs(top - yl);
      inner += `<rect x="${x.toFixed(1)}" y="${yy.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0, hh).toFixed(1)}" fill="${C.steel}"/>`;
    });
    inner += vline(sxC(tSel - 1), C.steelSoft, "", pT, pB);
    inner += overlay(N, pL, pR, pT, pB);
    return svg(vh, inner);
  }

  /* ---------- 数式行 ---------- */
  function FRowHTML(name, note, symbol, subst, result, tone) {
    return `<div class="frow"><div class="frow-name">${name}${note ? `<span class="frow-note">${note}</span>` : ""}</div>`
      + `<div class="frow-body"><div class="fline"><span class="ftag">式</span><span class="fmath">${symbol}</span></div>`
      + (subst ? `<div class="fline"><span class="ftag">代入</span><span class="fmath">${subst}</span></div>` : "")
      + `<div class="fline"><span class="ftag eq">＝</span><span class="fres" style="color:${tone || C.ink}">${result}</span></div></div></div>`;
  }
  function buildConst() {
    let d;
    if (state.useDep) d = FRowHTML("減価償却費", "建物の価値の目減りを、毎年いくら経費にできるか",
      `D = ${fr("建物価格", "47")}`, `D = ${fr(state.buildingMan.toLocaleString() + "万", "47")}`, `${fMan(sim.D)}円 / 年`, C.gold);
    else d = FRowHTML("減価償却費", "今回は減価償却をしない前提", "D = 0（経費に入れない）", "", "0円 / 年", C.gold);
    let m;
    if (state.loanMethod === "ganri") m = FRowHTML("毎月のローン返済額", "元利均等：毎月の支払い合計が一定（最初は利息が多い）",
      `M = ${fr("借入額 × 月利", "1 − (1+月利)<sup>−回数</sup>")}`,
      `M = ${fr(`${fMan(sim.L0)}円 × ${(sim.monthlyRate * 100).toFixed(4)}%`, `1 − (1+${(sim.monthlyRate * 100).toFixed(4)}%)<sup>−${sim.nMonths}</sup>`)}`,
      `${yen(sim.M).toLocaleString()}円 / 月（毎月一定）`, C.steel);
    else m = FRowHTML("毎月のローン返済額", "元金均等：元金は一定・利息は残高とともに減るので、支払いは年々下がる",
      `毎月 = 元金（${fr("借入額", "回数")}）＋ 残高 × 月利`,
      `元金 = ${fr(fMan(sim.L0) + "円", sim.nMonths + "回")} ＝ ${yen(sim.monthlyPrincipal).toLocaleString()}円（毎月一定）`,
      `初回 約${yen(sim.monthlyPrincipal + sim.L0 * sim.monthlyRate).toLocaleString()}円 → 年々減っていく`, C.steel);
    return `<div class="const-box"><div class="const-title">毎年共通の定数</div>${d}${m}</div>`;
  }
  function buildCalcRows(tSel) {
    const R = sim.rows[tSel - 1], p = state;
    let h = "";
    h += FRowHTML("① 実際に入る家賃", "満室の家賃から、空室のぶんを引いた額",
      `R = 月家賃 × 12 × (1−空室率) × ${pw("(1+家賃変動率)", "t−1")}`,
      `R = ${p.rentMan}万 × 12 × (1−${p.vacancy}%) × ${pw(`(1${p.rentChg >= 0 ? "+" : ""}${p.rentChg}%)`, tSel - 1)}`,
      `${fMan(R.rent)}円`);
    h += FRowHTML("② 物件の値段（その年）", "価格変動率で増えたり減ったり",
      `V = 物件価格 × ${pw("(1+価格変動率)", "t")}`,
      `V = ${p.priceMan}万 × ${pw(`(1${p.valueChg >= 0 ? "+" : ""}${p.valueChg}%)`, tSel)}`, `${fMan(R.V)}円`);
    h += FRowHTML("③ 毎年の費用＋税金", "維持コストは物価で増え、固定資産税は評価替えで変わる",
      `OPEX = 維持コスト${pw("₀×(1+物価)", "t−1")} ＋ 固定資産税${pw("₀×(1+変動)", "t−1")}`,
      `OPEX = ${p.opexMan}万×${pw(`(1+${p.inflation}%)`, tSel - 1)} ＋ ${p.taxMan}万×${pw(`(1${p.taxChg >= 0 ? "+" : ""}${p.taxChg}%)`, tSel - 1)}`,
      `${fMan(R.opex)}円（維持 ${fMan(R.opexRun)}＋税 ${fMan(R.propTax)}）`);
    h += FRowHTML("④ ローン返済の中身", "返済を、利息（手数料）と元金（借金の返済）に分ける",
      `年間 = Σ<sub>12ヶ月</sub>（利息 ＋ 元金）`,
      tSel <= p.term ? `毎月：利息＝残高×月利。${p.loanMethod === "gankin" ? "元金は毎月一定。" : "元金＝返済額−利息。"}返したぶん残債が減る` : "すでに完済",
      `利息 ${fMan(R.interest)}／元金 ${fMan(R.principal)}／合計 ${fMan(R.debt)}　→ 年末の残債 ${fMan(R.loan)}円`);
    h += FRowHTML("⑤ 税金がかかる利益", p.useDep ? "ポイント：元金返済は引けない／減価償却は引ける" : "減価償却を引かないぶん、利益（＝税金）は高めに出ます",
      p.useDep ? "課税所得 = R − 費用 − 利息 − 減価償却" : "課税所得 = R − 費用 − 利息",
      p.useDep ? `= ${fMan(R.rent)} − ${fMan(R.opex)} − ${fMan(R.interest)} − ${fMan(R.dep)}` : `= ${fMan(R.rent)} − ${fMan(R.opex)} − ${fMan(R.interest)}`,
      `${fMan(R.taxable)}円`, R.taxable < 0 ? C.teal : C.ink);
    h += FRowHTML("⑥ 払う税金", R.taxable < 0 ? "赤字なら、損益通算で戻ってくる（マイナス＝還付）" : "上の利益にかかる税金",
      "税金 = 課税所得 × 税率", `= ${fMan(R.taxable)} × ${p.incomeTax}%`, `${fMan(R.tax)}円`, R.tax < 0 ? C.teal : C.ink);
    h += FRowHTML("⑦ 手元に残る現金", "その年に実際に残るお金（キャッシュフロー）",
      "CF = R − 費用 − ローン返済 − 税金", `= ${fMan(R.rent)} − ${fMan(R.opex)} − ${fMan(R.debt)} − ${fMan(R.tax)}`,
      `${fMan(R.cf)}円`, R.cf >= 0 ? C.teal : C.red);
    h += FRowHTML("⑧ 純資産（持ち続けた場合）", "売らずに持っていれば、これがあなたの取り分",
      "純資産 = 物件の値段 − ローン残高 ＋ たまった現金", `= ${fMan(R.V)} − ${fMan(R.loan)} ＋ ${fMan(R.accumCF)}`,
      `<span style="font-size:17px">${fYen(R.nwHold)}</span>`, C.steel);
    h += FRowHTML("⑨ 純資産（売った場合の手取り）", "売却の費用と税金を引いた、実際の手取り",
      "= たまった現金 ＋（物件の値段 − 売却費 − 残ったローン − 譲渡税）",
      `譲渡益 ${fMan(R.gain)} × ${fPct(R.cgRate, 2)} ＝ 譲渡税 ${fMan(R.cgTax)}`,
      `<span style="font-size:17px">${fYen(R.nwReal)}</span>`, C.gold);
    return h;
  }

  /* ---------- KPI / イベント / B/S / 用語集 ---------- */
  function buildKpis() {
    const k = [
      [`${state.years}年後の純資産（保有）`, fYen(sim.finalHold), C.steel, "売らずに持ち続けた場合", "売らずに持ち続けた場合の、あなたの正味の資産。物件の評価額から残ったローンを引き、たまった現金を足したもの。"],
      [`${state.years}年後の純資産（売却）`, fYen(sim.finalReal), sim.finalReal >= sim.equity ? C.teal : C.red, "その年に売って精算した手取り", "その年に売った場合に、税金や残ったローンを精算して、実際に手元へ残る金額。売却の費用と税金がかかるぶん、保有より少なめになります。"],
      ["自己資金IRR", sim.eqIrr == null ? "—" : fPct(sim.eqIrr), (sim.eqIrr != null && sim.eqIrr >= 0) ? C.steel : C.red, `自己資金 ${fYen(sim.equity)} が ${sim.multiple.toFixed(2)}倍に`, "投じた自己資金（頭金＋諸費用）が、年あたり何%で増えたかの指標。預金金利のように『年◯%で回った』と読めます。"],
      ["初年度のキャッシュフロー", fYen(sim.firstCF), sim.firstCF >= 0 ? C.ink : C.red, `表面利回り ${fPct(sim.grossYield)}`, "1年目に実際に手元へ残る現金（家賃 − 経費 − ローン返済 − 税金）。マイナスなら毎月の持ち出しがある状態です。"],
    ];
    return k.map(([label, value, tone, sub, inf]) => `<div class="kpi"><div class="kpi-label">${label}${info(inf)}</div><div class="kpi-value" style="color:${tone}">${value}</div><div class="kpi-sub">${sub}</div></div>`).join("");
  }
  function buildEvents() {
    let s = "";
    if (state.useDep) {
      s += sim.deadCross
        ? `<span class="ev red">デッドクロス ${sim.deadCross}年目 ${info("経費にできる減価償却より、経費にできない元金返済のほうが大きくなる時点。帳簿は黒字でも手元の現金が苦しくなりやすい。")}</span>`
        : `<span class="ev muted">デッドクロスなし ${info("計算した年数の範囲では、減価償却より元金返済が大きくなる時点が来ない、という意味。")}</span>`;
      s += `<span class="ev gold">減価償却終了 47年目 ${info("建物の減価償却が終わる年。これ以降は経費が減るので、税金が増えてキャッシュフローが悪化しがちです。")}</span>`;
    } else {
      s += `<span class="ev muted">減価償却なしで計算中 ${info("今回は減価償却を使わない前提です。経費が減るぶん税金は高めになりますが、デッドクロスは起きず、売却時の譲渡税はむしろ安くなります。")}</span>`;
    }
    s += `<span class="ev teal">完済 ${state.term}年目 ${info("ローンを返し終わる年。これ以降は返済がなくなり、手元に残るお金が大きく増えます。")}</span>`;
    return s;
  }
  function chipData() {
    return [{ y: 1, l: "1年目" },
      sim.deadCross ? { y: sim.deadCross, l: `DC ${sim.deadCross}年` } : null,
      state.term <= state.years ? { y: state.term, l: `完済 ${state.term}年` } : null,
      { y: state.years, l: `最終 ${state.years}年` }].filter(Boolean);
  }
  function chipsHTML(tSel) {
    return chipData().map((c) => `<button class="ychip${tSel === c.y ? " on" : ""}" data-year="${c.y}">${c.l}</button>`).join("");
  }
  function buildBS(tSel) {
    const rows = sim.rows, R = rows[tSel - 1];
    const bsPrevV = tSel > 1 ? rows[tSel - 2].V : sim.P;
    const bsPrevEq = tSel > 1 ? rows[tSel - 2].nwHold : (sim.down - sim.acq);
    const dV = R.V - bsPrevV, netIncome = R.taxable - R.tax, dEquity = R.nwHold - bsPrevEq;
    const assetsTotal = R.V + R.accumCF, totFund = R.loan + R.nwHold;
    const loanPct = totFund > 0 ? Math.max(0, Math.min(100, (R.loan / totFund) * 100)) : 0, eqPct = 100 - loanPct;
    const unreal = R.V - R.book;
    return `<div class="bs"><div class="bs-col"><div class="bs-side">借方（資産）＝ 持っているもの</div>`
      + `<div class="bs-item"><span>物件（時価）</span><span>${fYen(R.V)}</span></div>`
      + `<div class="bs-item"><span>現金（累積キャッシュフロー）</span><span style="color:${R.accumCF < 0 ? C.red : C.ink}">${fYen(R.accumCF)}</span></div>`
      + `<div class="bs-total"><span>資産合計</span><span>${fYen(assetsTotal)}</span></div></div>`
      + `<div class="bs-eq">＝</div>`
      + `<div class="bs-col"><div class="bs-side">貸方（負債・純資産）＝ 元手の出どころ</div>`
      + `<div class="bs-item"><span>ローン残高（負債）</span><span style="color:${C.red}">${fYen(R.loan)}</span></div>`
      + `<div class="bs-item strong"><span>純資産（自分の取り分）</span><span>${fYen(R.nwHold)}</span></div>`
      + `<div class="bs-total"><span>負債＋純資産</span><span>${fYen(R.loan + R.nwHold)}</span></div></div></div>`
      + `<div class="lev"><div class="lev-bar"><div class="lev-debt" style="width:${loanPct}%"></div><div class="lev-eq" style="width:${eqPct}%"></div></div>`
      + `<div class="lev-legend"><span>ローン（銀行のもの） ${loanPct.toFixed(0)}%</span><span>純資産（自分のもの） ${eqPct.toFixed(0)}%</span></div></div>`
      + `<div class="artic"><div class="artic-title">P/L → B/S の橋渡し：なぜ純資産が前年から${dEquity >= 0 ? "増えた" : "減った"}のか</div>`
      + `<div class="artic-eq">純資産の変化 <b>${fYen(dEquity)}</b> ＝ 物件評価額の変動 ${fYen(dV)} ＋ 当期純利益 ${fYen(netIncome)}${state.useDep ? ` ＋ 減価償却の戻し ${fYen(R.dep)}` : ""}</div>`
      + `<div class="artic-note">損益計算書（P/L）で出した「当期純利益」が、そのまま貸借対照表（B/S）の「純資産」に積み上がっていく——これが2つの表が本質的に同じものである理由です。${state.useDep ? "減価償却は現金が出ていかない費用なので、時価ベースの純資産には響かず足し戻します。" : ""}</div></div>`
      + `<div class="bs-book"><span><span class="lbl">時価</span>${fYen(R.V)}</span><span><span class="lbl">簿価</span>${fYen(R.book)}</span>`
      + `<span><span class="lbl">含み${unreal >= 0 ? "益" : "損"}</span><span style="color:${unreal >= 0 ? C.teal : C.red}">${fYen(unreal)}</span></span>`
      + `<div class="bs-book-note">含み損益＝時価−簿価。売却時の譲渡税は、この含み益にかかります（含み損なら課税なし）。${state.useDep ? "減価償却で簿価が下がるほど含み益がふくらみ、売却時の税金は重くなります。" : "減価償却オフだと簿価が下がらないので、含み益は出にくく、譲渡税も軽くなります。"}</div></div>`;
  }
  function glossHTML() {
    return `<div class="gloss">${GLOSSARY.map(([t, d]) => `<div class="gloss-row"><div class="gloss-term">${t}</div><div class="gloss-def">${d}</div></div>`).join("")}</div>`;
  }
  function loanNote() {
    return `棒＝その年の返済の中身（青＝元金、赤＝利息／左軸）。${state.loanMethod === "ganri"
      ? "元利均等なので棒の高さ（年間の返済合計）はほぼ一定ですが、中身は年々『利息が減って元金が増える』形に変わります。"
      : "元金均等なので棒の高さ（年間の返済合計）は年々小さくなります（元金が一定で、利息が減るため）。"}金色の線＝まだ残っているローン（残債／右軸）で、返済のたびに毎年減っていきます。`;
  }
  function disclaimer() {
    return `※ 概算モデルです。${state.useDep
      ? "減価償却あり（新築RC・定額法47年）で計算しています。"
      : "いまは減価償却オフで計算しています（建物の価値の目減りを経費に入れない）。個人の確定申告では減価償却は原則“必須＝強制償却”で、オフにできるのは法人などに限られる点にご注意ください。"}`
      + "固定資産税は初年度の実額×変動率で近似（3年ごとの評価替えや、新築軽減が切れるときの段差は簡略化）。譲渡税は5年以内39.63%／5年超20.315%で計算。取得費は物件価格＋諸費用の概算。実際の判断は税理士など専門家にご相談ください。投資助言ではありません。入力した数字は、この端末（ブラウザ）の中にだけ保存されます。";
  }

  /* ---------- 更新 ---------- */
  function clampDeps() {
    if (state.buildingMan > state.priceMan) state.buildingMan = state.priceMan;
    if (state.downMan > state.priceMan) state.downMan = state.priceMan;
    if (yr > state.years) yr = state.years; if (yr < 1) yr = 1;
    ["buildingMan", "downMan"].forEach((k) => {
      const rng = document.querySelector(`.main-range[data-key="${k}"]`);
      const num = document.querySelector(`.main-num[data-key="${k}"]`);
      if (rng) { rng.max = state.priceMan; rng.value = state[k]; }
      if (num) num.value = state[k];
    });
    const bh = document.querySelector('[data-hint="buildingMan"]');
    if (bh) bh.innerHTML = state.useDep
      ? `売買契約書に書かれた建物分の金額。残り 土地 ${Math.max(0, state.priceMan - state.buildingMan).toLocaleString()}万円。建物だけが減価償却（価値の目減りを経費にできる仕組み）の対象です。`
      : `売買契約書に書かれた建物分の金額。残り 土地 ${Math.max(0, state.priceMan - state.buildingMan).toLocaleString()}万円。※いまは減価償却オフのため、この金額は計算に使われません。`;
  }
  function updateAll() {
    clampDeps();
    sim = simulate(state);
    byId("kpis").innerHTML = buildKpis();
    byId("eventbar").innerHTML = buildEvents();
    byId("svgCF").innerHTML = chartCF();
    byId("svgLoan").innerHTML = chartLoan();
    byId("loanNote").innerHTML = loanNote();
    byId("constBox").innerHTML = buildConst();
    byId("disc").innerHTML = disclaimer();
    byId("ysl1").max = state.years; byId("ysl2").max = state.years;
    byId("glossToggle").textContent = showGloss ? "▾ 用語の意味を閉じる" : "▸ わからない言葉があれば開く｜用語の意味";
    byId("glossBody").innerHTML = showGloss ? glossHTML() : "";
    updateYear();
    save();
  }
  function updateYear() {
    const tSel = curYear();
    byId("svgNW").innerHTML = chartNW(tSel);
    byId("svgBS").innerHTML = chartBS(tSel);
    byId("bsCur").innerHTML = `<b>${tSel}年目</b>のスナップショット`;
    byId("calcCur").innerHTML = `<b>${tSel}年目</b>の計算過程`;
    byId("bsSnap").innerHTML = buildBS(tSel);
    byId("calcRows").innerHTML = buildCalcRows(tSel);
    byId("ypick1").innerHTML = chipsHTML(tSel);
    byId("ypick2").innerHTML = chipsHTML(tSel);
    const a = byId("ysl1"), b = byId("ysl2"); if (a) a.value = tSel; if (b) b.value = tSel;
    save();
  }
  function scheduleAll() { if (raf) cancelAnimationFrame(raf); raf = requestAnimationFrame(() => { raf = null; updateAll(); }); }

  /* ---------- マウント ---------- */
  function resultsSkeleton() {
    return `<main class="results">`
      + `<div style="display:flex;justify-content:flex-end;margin-bottom:-4px"><button id="resetBtn" class="ychip">初期値に戻す</button></div>`
      + `<div id="kpis" class="kpi-grid"></div>`
      + `<div id="eventbar" class="eventbar"></div>`
      + `<div class="panel"><div class="panel-head"><h3>純資産の推移</h3><div class="legend"><i style="background:${C.steel}"></i>保有<i style="background:${C.gold};margin-left:12px"></i>売却時</div></div><div id="svgNW"></div><div class="chart-note">青い面 ＝ 持ち続けた場合の純資産。金色の点線 ＝ その年に売ったときの手取り。点線が下なのは、売ると費用と税金がかかるためです。グラフ内をタップすると、その年が下のB/S・計算に反映されます。</div></div>`
      + `<div class="panel"><div class="panel-head"><h3>1年ごとに手元へ残る現金（キャッシュフロー）</h3><div class="legend"><i style="background:${C.teal}"></i>プラス<i style="background:${C.red};margin-left:12px"></i>マイナス（持ち出し）</div></div><div id="svgCF"></div></div>`
      + `<div class="panel"><div class="panel-head"><h3>ローン残高と返済の内訳</h3><div class="legend"><i style="background:${C.steel}"></i>元金<i style="background:${C.red};margin-left:12px"></i>利息<i style="background:${C.gold};margin-left:12px"></i>残債</div></div><div id="svgLoan"></div><div class="chart-note" id="loanNote"></div></div>`
      + `<div class="panel"><div class="panel-head"><h3>貸借対照表（B/S）</h3><div class="yearpick" id="ypick1"></div></div>`
      + `<div class="calc-intro">いまの計算は「1年ごとのもうけ」を積み上げる損益計算書（P/L）の発想です。同じ数字を「ある時点の財産の状態」として切り直したのが、この貸借対照表（B/S）。<b>資産 ＝ 負債 ＋ 純資産</b> で必ず釣り合います。</div>`
      + `<input class="yslider" id="ysl1" type="range" min="1" step="1"><div class="calc-cur" id="bsCur"></div><div id="bsSnap"></div>`
      + `<div class="panel-subtitle">B/Sの時系列：総資産のうち「ローン（赤）」が減り「純資産（青）」が増えていく</div><div id="svgBS"></div></div>`
      + `<div class="panel"><button class="gloss-toggle" id="glossToggle"></button><div id="glossBody"></div></div>`
      + `<div class="panel calc"><div class="panel-head"><h3>計算をたどる</h3><div class="yearpick" id="ypick2"></div></div>`
      + `<div class="calc-intro">数式が苦手なら、ここは読み飛ばしてOK。グラフと用語集だけでも十分わかります。年を選ぶと、その年の数字の出どころを順番に表示します。</div>`
      + `<input class="yslider" id="ysl2" type="range" min="1" step="1"><div class="calc-cur" id="calcCur"></div><div id="constBox"></div><div id="calcRows"></div></div>`
      + `<p class="disclaimer" id="disc"></p></main>`;
  }
  const HEADER = `<header class="hdr"><div class="eyebrow">新築 RC マンション / 純資産シミュレーション</div><h1>はじめての不動産投資、純資産はどう増える？</h1><p class="lead">鉄筋コンクリート（RC）の新築に絞ったシミュレーターです。専門用語には<span class="qmark">?</span>マークが付いていて、タップすると意味が出ます。</p></header>`;
  const INTRO = `<div class="intro"><div class="intro-title">このシミュレーターの考え方</div><ol class="intro-steps"><li><b>自分のお金（自己資金）</b>を頭金と諸費用に使って物件を買う。</li><li>入居者からの<b>家賃</b>で、ローンの返済や経費・税金を払う。</li><li>残ったお金（<b>キャッシュフロー</b>）が毎年たまり、同時に<b>ローンも減っていく</b>。</li><li>結果として「物件の価値 − 残ったローン ＋ たまった現金」＝<b>純資産</b>が育つ。</li></ol><div class="intro-foot">下のグラフは、この純資産が何年でどう増える（または減る）かを表しています。</div></div>`;

  function rebuildControls() { byId("controls").innerHTML = controlsHTML(); }
  function mount() {
    const root = byId("root");
    root.innerHTML = `<style>${CSS}</style>` + HEADER + INTRO
      + `<div class="layout"><aside class="controls" id="controls">${controlsHTML()}</aside>${resultsSkeleton()}</div>`;
    updateAll();
  }

  /* ---------- イベント委譲 ---------- */
  document.addEventListener("input", (e) => {
    const t = e.target;
    if (t.classList && (t.classList.contains("main-range") || t.classList.contains("main-num"))) {
      const k = t.dataset.key; let v = parseFloat(t.value); if (isNaN(v)) v = 0; state[k] = v;
      const sel = t.classList.contains("main-range") ? `.main-num[data-key="${k}"]` : `.main-range[data-key="${k}"]`;
      const other = document.querySelector(sel); if (other && other !== t) other.value = t.value;
      scheduleAll();
    } else if (t.classList && t.classList.contains("yslider")) {
      yr = parseInt(t.value) || 1; updateYear();
    }
  });
  document.addEventListener("change", (e) => {
    const t = e.target;
    if (t.classList && t.classList.contains("chk")) { state[t.dataset.key] = t.checked; updateAll(); }
  });
  document.addEventListener("click", (e) => {
    const seg = e.target.closest(".seg-btn");
    if (seg) { state.loanMethod = seg.dataset.loan; document.querySelectorAll(".seg-btn").forEach((b) => b.classList.toggle("on", b.dataset.loan === state.loanMethod)); updateAll(); return; }
    const chip = e.target.closest(".ychip");
    if (chip && chip.dataset.year) { yr = parseInt(chip.dataset.year) || 1; updateYear(); return; }
    const hit = e.target.closest(".yhit");
    if (hit) { yr = parseInt(hit.dataset.year) || 1; updateYear(); return; }
    if (e.target.id === "glossToggle") { showGloss = !showGloss; byId("glossToggle").textContent = showGloss ? "▾ 用語の意味を閉じる" : "▸ わからない言葉があれば開く｜用語の意味"; byId("glossBody").innerHTML = showGloss ? glossHTML() : ""; save(); return; }
    if (e.target.id === "resetBtn") { state = Object.assign({}, BASE); yr = 1; showGloss = false; rebuildControls(); updateAll(); return; }
    const ib = e.target.closest(".info-btn");
    document.querySelectorAll(".info-pop").forEach((p) => p.remove());
    if (ib) { e.stopPropagation(); const sp = document.createElement("span"); sp.className = "info-pop"; sp.textContent = ib.dataset.info; ib.parentNode.appendChild(sp); }
  });

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", mount);
  else mount();
})();

</script>
</body>
</html>
