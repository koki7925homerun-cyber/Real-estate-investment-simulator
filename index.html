/* ===================== テーマ ===================== */
const C = {
  page: "#E7E8EA", card: "#FBFBFC", ink: "#1E212A", soft: "#666C76",
  faint: "#99A0A8", border: "#DEDFE2", grid: "#ECEDEF",

  gold: "#A9792F", red: "#BC4A2E",
};
const FONT = '"Hiragino Sans","Noto Sans JP","Yu Gothic",Meiryo,system-ui,sans-serif';
const RC_LEGAL = 47;

/* ===================== フォーマッタ ===================== */
const yen = (v) => Math.round(v);
const fMan = (v) => (v / 1e4).toLocaleString(undefined, { maximumFractionDigits: 1 }) + "万";
const fYen = (v) => {
  const a = Math.abs(v);
  if (a >= 1e8) return (v / 1e8).toFixed(2) + "億円";
  return Math.round(v / 1e4).toLocaleString() + "万円";
};
const fPct = (x, d = 1) => (x * 100).toFixed(d) + "%";
const axisTick = (v) => (Math.abs(v) >= 1e8 ? (v / 1e8).toFixed(1) + "億" : Math.round(v / 1e4).toLocaleString());

/* ===================== IRR ===================== */
function irr(cfs) {
  const npv = (r) => cfs.reduce((a, c, i) => a + c / Math.pow(1 + r, i), 0);
  let lo = -0.9, hi = 1, fLo = npv(lo), fHi = npv(hi), t = 0;
  while (fLo * fHi > 0 && hi < 12 && t < 60) { hi += 0.5; fHi = npv(hi); t++; }
  if (fLo * fHi > 0) return null;
  for (let i = 0; i < 120; i++) {
    const m = (lo + hi) / 2, fM = npv(m);
    if (Math.abs(fM) < 1) return m;
    if (fLo * fM < 0) { hi = m; } else { lo = m; fLo = fM; }
  }
  return (lo + hi) / 2;
}

/* ===================== シミュレーション ===================== */
function simulate(p) {
  const P = p.priceMan * 1e4;
  const B = Math.min(p.buildingMan * 1e4, P);
  const acq = p.acqMan * 1e4;
  const down = Math.min(p.downMan * 1e4, P);
  const L0 = Math.max(0, P - down);
  const equity = down + acq;

  const r = p.rate / 100 / 12;
  const n = p.term * 12;
  const M = L0 > 0 ? (r === 0 ? L0 / n : (L0 * r) / (1 - Math.pow(1 + r, -n))) : 0;
  const monthlyPrincipal = n > 0 ? L0 / n : 0;
  const D = B / RC_LEGAL;

  const opex0 = p.opexMan * 1e4;
  const tax0 = p.taxMan * 1e4;

  const rows = [];
  let loan = L0, accumCF = -acq, accumDep = 0, deadCross = null;
  const stream = [-equity];

  for (let t = 1; t <= p.years; t++) {
    const V = P * Math.pow(1 + p.valueChg / 100, t);
    const rent = p.rentMan * 1e4 * 12 * Math.pow(1 + p.rentChg / 100, t - 1) * (1 - p.vacancy / 100);
    const opexRun = opex0 * Math.pow(1 + p.inflation / 100, t - 1);
    const propTax = tax0 * Math.pow(1 + p.taxChg / 100, t - 1);
    const opex = opexRun + propTax;

    let interest = 0, principal = 0;
    for (let m = 0; m < 12; m++) {
      if (loan <= 0 || t > p.term) break;
      const i = loan * r;
      let pr = p.loanMethod === "gankin" ? monthlyPrincipal : M - i;
      if (pr > loan) pr = loan;
      interest += i; principal += pr; loan -= pr;
    }
    const debt = interest + principal;
    const dep = (p.useDep && t <= RC_LEGAL) ? D : 0;
    accumDep += dep;
    if (p.useDep && deadCross === null && debt > 0 && principal > dep) deadCross = t;

    const taxable = rent - opex - interest - dep;
    const tax = taxable >= 0 ? taxable * (p.incomeTax / 100) : (p.lossOffset ? taxable * (p.incomeTax / 100) : 0);
    const cf = rent - opex - debt - tax;
    accumCF += cf; stream.push(cf);

    const saleCost = V * (p.saleRate / 100);
    const book = P + acq - accumDep;
    const gain = V - saleCost - book;
    const cgRate = t <= 5 ? 0.3963 : 0.20315;
    const cgTax = Math.max(0, gain) * cgRate;
    const saleNet = V - saleCost - loan - cgTax;

    rows.push({
      year: t, V, rent, opex, opexRun, propTax, interest, principal, debt,
      dep, accumDep, taxable, tax, cf, accumCF, loan,
      nwHold: V - loan + accumCF, nwReal: accumCF + saleNet,
      saleCost, book, gain, cgRate, cgTax, saleNet,
    });
  }

  const last = rows[rows.length - 1];
  const s = [...stream]; s[s.length - 1] += last.saleNet;
  const eqIrr = irr(s);
  const y1 = rows[0];
  const grossYield = (p.rentMan * 1e4 * 12) / P;

  return {
    rows, P, B, acq, L0, down, equity, M, monthlyPrincipal, D, opex0, tax0, monthlyRate: r, nMonths: n,
    deadCross, finalHold: last.nwHold, finalReal: last.nwReal,
    multiple: equity > 0 ? last.nwReal / equity : 0, eqIrr, firstCF: y1.cf, grossYield,
  };
}

/* ===================== 用語集 ===================== */
const GLOSSARY = [

/* ===================== 数式パーツ ===================== */
const Frac = ({ n, d }) => (<span className="frac"><span className="fn">{n}</span><span className="fd">{d}</span></span>);
const Pow = ({ b, e }) => (<span>{b}<sup>{e}</sup></span>);

function FRow({ name, note, symbol, subst, result, tone }) {
  return (
    <div className="frow">
      <div className="frow-name">{name}{note && <span className="frow-note">{note}</span>}</div>
      <div className="frow-body">
        <div className="fline"><span className="ftag">式</span><span className="fmath">{symbol}</span></div>
        {subst && <div className="fline"><span className="ftag">代入</span><span className="fmath">{subst}</span></div>}
        <div className="fline"><span className="ftag eq">＝</span><span className="fres" style={{ color: tone || C.ink }}>{result}</span></div>
      </div>
    </div>
  );
}

/* ===================== 小物 ===================== */
function Info({ text }) {
  const [o, setO] = useState(false);
  return (
    <span className="info">
      <button type="button" className="info-btn" onClick={() => setO((v) => !v)} aria-label="説明">?</button>
      {o && <span className="info-pop" onClick={() => setO(false)}>{text}</span>}
    </span>
  );
}
function Control({ label, value, onChange, min, max, step, unit, hint }) {
  return (
    <div className="ctrl">
      <div className="ctrl-head">
        <span className="ctrl-label">{label}</span>
        <span className="ctrl-val">
          <input type="number" value={value} step={step}
            onChange={(e) => onChange(e.target.value === "" ? 0 : parseFloat(e.target.value))} />
          <em>{unit}</em>
        </span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={(e) => onChange(parseFloat(e.target.value))} />
      {hint && <div className="ctrl-hint">{hint}</div>}
    </div>
  );
}
function Kpi({ label, value, sub, tone, info }) {
  return (
    <div className="kpi">
      <div className="kpi-label">{label}{info && <Info text={info} />}</div>
      <div className="kpi-value" style={{ color: tone || C.ink }}>{value}</div>
      {sub && <div className="kpi-sub">{sub}</div>}
    </div>
  );
}

                <Area type="monotone" dataKey="nwHold" name="保有純資産" stroke={C.steel} strokeWidth={2.4} fill="url(#g)" />
                <Line type="monotone" dataKey="nwReal" name="売却時の手取り" stroke={C.gold} strokeWidth={2} dot={false} strokeDasharray="5 4" />
              </ComposedChart>
            </ResponsiveContainer>
            <div className="chart-note">
              青い面 ＝ 持ち続けた場合の純資産。金色の点線 ＝ その年に売ったときの手取り。点線が下なのは、売ると費用と税金がかかるためです。
            </div>
          </div>

          <div className="panel">
            <div className="panel-head">
              <h3>1年ごとに手元へ残る現金（キャッシュフロー）</h3>
              <div className="legend"><i style={{ background: C.teal }} />プラス<i style={{ background: C.red, marginLeft: 12 }} />マイナス（持ち出し）</div>
            </div>
            <ResponsiveContainer width="100%" height={210}>
              <BarChart data={rows} margin={{ top: 6, right: 12, left: 6, bottom: 4 }}>
                <CartesianGrid stroke={C.grid} vertical={false} />
                <XAxis dataKey="year" tick={{ fill: C.soft, fontSize: 11 }} tickLine={false} axisLine={{ stroke: C.border }} />
                <YAxis tickFormatter={axisTick} tick={{ fill: C.soft, fontSize: 11 }} tickLine={false} axisLine={false} width={46} />
                <Tooltip content={<TT />} />
                <ReferenceLine y={0} stroke={C.faint} />
                {sim.deadCross && <ReferenceLine x={sim.deadCross} stroke={C.red} strokeDasharray="4 3" />}
                <Bar dataKey="cf" name="手残り現金">
                  {rows.map((d, i) => <Cell key={i} fill={d.cf >= 0 ? C.teal : C.red} />)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>

          <div className="panel">
            <div className="panel-head">
              <h3>ローン残高と返済の内訳</h3>
              <div className="legend"><i style={{ background: C.steel }} />元金<i style={{ background: C.red, marginLeft: 12 }} />利息<i style={{ background: C.gold, marginLeft: 12 }} />残債</div>
            </div>
            <ResponsiveContainer width="100%" height={230}>
              <ComposedChart data={rows} margin={{ top: 6, right: 12, left: 6, bottom: 4 }}>
                <CartesianGrid stroke={C.grid} vertical={false} />
                <XAxis dataKey="year" tick={{ fill: C.soft, fontSize: 11 }} tickLine={false} axisLine={{ stroke: C.border }} />
                <YAxis yAxisId="left" tickFormatter={axisTick} tick={{ fill: C.soft, fontSize: 11 }} tickLine={false} axisLine={false} width={46} />
                <YAxis yAxisId="right" orientation="right" tickFormatter={axisTick} tick={{ fill: C.gold, fontSize: 11 }} tickLine={false} axisLine={false} width={46} />
                <Tooltip content={<TT />} />
                <Bar yAxisId="left" dataKey="principal" name="元金（その年）" stackId="a" fill={C.steel} />
                <Bar yAxisId="left" dataKey="interest" name="利息（その年）" stackId="a" fill={C.red} fillOpacity={0.5} />
                <Line yAxisId="right" type="monotone" dataKey="loan" name="残債" stroke={C.gold} strokeWidth={2.2} dot={false} />
              </ComposedChart>
            </ResponsiveContainer>
            <div className="chart-note">
              棒＝その年の返済の中身（青＝元金、赤＝利息／左軸）。{p.loanMethod === "ganri"
                ? "元利均等なので棒の高さ（年間の返済合計）はほぼ一定ですが、中身は年々『利息が減って元金が増える』形に変わります。"
                : "元金均等なので棒の高さ（年間の返済合計）は年々小さくなります（元金が一定で、利息が減るため）。"}
              金色の線＝まだ残っているローン（残債／右軸）で、返済のたびに毎年減っていきます。
            </div>
          </div>

          {/* 貸借対照表 B/S */}
          <div className="panel">
            <div className="panel-head">
              <h3>貸借対照表（B/S）</h3>
              <div className="yearpick">
                {yearChips.map((c) => (
                  <button key={c.y} className={"ychip" + (tSel === c.y ? " on" : "")} onClick={() => setYr(c.y)}>{c.l}</button>
                ))}
              </div>
            </div>
            <div className="calc-intro">
              いまの計算は「1年ごとのもうけ」を積み上げる損益計算書（P/L）の発想です。同じ数字を「ある時点の財産の状態」として切り直したのが、この貸借対照表（B/S）。<b>資産 ＝ 負債 ＋ 純資産</b> で必ず釣り合います。
            </div>
            <input className="yslider" type="range" min={1} max={p.years} step={1} value={tSel} onChange={(e) => setYr(parseInt(e.target.value))} />
            <div className="calc-cur"><b>{tSel}年目</b>のスナップショット</div>

            <div className="bs">
              <div className="bs-col">
                <div className="bs-side">借方（資産）＝ 持っているもの</div>
                <div className="bs-item"><span>物件（時価）</span><span>{fYen(R.V)}</span></div>
                <div className="bs-item"><span>現金（累積キャッシュフロー）</span><span style={{ color: R.accumCF < 0 ? C.red : C.ink }}>{fYen(R.accumCF)}</span></div>
                <div className="bs-total"><span>資産合計</span><span>{fYen(assetsTotal)}</span></div>
              </div>
              <div className="bs-eq">＝</div>
              <div className="bs-col">
                <div className="bs-side">貸方（負債・純資産）＝ 元手の出どころ</div>
                <div className="bs-item"><span>ローン残高（負債）</span><span style={{ color: C.red }}>{fYen(R.loan)}</span></div>
                <div className="bs-item strong"><span>純資産（自分の取り分）</span><span>{fYen(R.nwHold)}</span></div>
                <div className="bs-total"><span>負債＋純資産</span><span>{fYen(R.loan + R.nwHold)}</span></div>
              </div>
            </div>

            <div className="lev">
              <div className="lev-bar">
                <div className="lev-debt" style={{ width: loanPct + "%" }} />
                <div className="lev-eq" style={{ width: eqPct + "%" }} />
              </div>
              <div className="lev-legend"><span>ローン（銀行のもの） {loanPct.toFixed(0)}%</span><span>純資産（自分のもの） {eqPct.toFixed(0)}%</span></div>
            </div>

            <div className="artic">
              <div className="artic-title">P/L → B/S の橋渡し：なぜ純資産が前年から{dEquity >= 0 ? "増えた" : "減った"}のか</div>
              <div className="artic-eq">
                純資産の変化 <b>{fYen(dEquity)}</b> ＝ 物件評価額の変動 {fYen(dV)} ＋ 当期純利益 {fYen(netIncome)}{p.useDep ? <> ＋ 減価償却の戻し {fYen(R.dep)}</> : null}
              </div>
              <div className="artic-note">
                損益計算書（P/L）で出した「当期純利益」が、そのまま貸借対照表（B/S）の「純資産」に積み上がっていく——これが2つの表が本質的に同じものである理由です。{p.useDep ? "減価償却は現金が出ていかない費用なので、時価ベースの純資産には響かず足し戻します。" : ""}
              </div>
            </div>

            <div className="bs-book">
              <span><span className="lbl">時価</span>{fYen(R.V)}</span>
              <span><span className="lbl">簿価</span>{fYen(R.book)}</span>
              <span><span className="lbl">含み{unreal >= 0 ? "益" : "損"}</span><span style={{ color: unreal >= 0 ? C.teal : C.red }}>{fYen(unreal)}</span></span>
              <div className="bs-book-note">含み損益＝時価−簿価。売却時の譲渡税は、この含み益にかかります（含み損なら課税なし）。{p.useDep ? "減価償却で簿価が下がるほど含み益がふくらみ、売却時の税金は重くなります。" : "減価償却オフだと簿価が下がらないので、含み益は出にくく、譲渡税も軽くなります。"}</div>
            </div>

            <div className="panel-subtitle">B/Sの時系列：総資産のうち「ローン（赤）」が減り「純資産（青）」が増えていく</div>
            <ResponsiveContainer width="100%" height={210}>
              <BarChart data={rows} margin={{ top: 6, right: 12, left: 6, bottom: 4 }}>
                <CartesianGrid stroke={C.grid} vertical={false} />
                <XAxis dataKey="year" tick={{ fill: C.soft, fontSize: 11 }} tickLine={false} axisLine={{ stroke: C.border }} />
                <YAxis tickFormatter={axisTick} tick={{ fill: C.soft, fontSize: 11 }} tickLine={false} axisLine={false} width={46} />
                <Tooltip content={<TT />} />
                <ReferenceLine x={tSel} stroke={C.steelSoft} strokeWidth={1.4} />
                <Bar dataKey="loan" name="ローン残高（負債）" stackId="bs" fill={C.red} fillOpacity={0.4} />
                <Bar dataKey="nwHold" name="純資産" stackId="bs" fill={C.steel} />
              </BarChart>
            </ResponsiveContainer>
          </div>

          {/* 用語集 */}
          <div className="panel">
            <button className="gloss-toggle" onClick={() => setShowGloss((s) => !s)}>
              {showGloss ? "▾ 用語の意味を閉じる" : "▸ わからない言葉があれば開く｜用語の意味"}
            </button>
            {showGloss && (
              <div className="gloss">
                {GLOSSARY.map(([term, def]) => (
                  <div className="gloss-row" key={term}>
                    <div className="gloss-term">{term}</div>
                    <div className="gloss-def">{def}</div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* 計算過程 */}
          <div className="panel calc">
            <div className="panel-head">
              <h3>計算をたどる</h3>
              <div className="yearpick">
                {yearChips.map((c) => (
                  <button key={c.y} className={"ychip" + (tSel === c.y ? " on" : "")} onClick={() => setYr(c.y)}>{c.l}</button>
                ))}
              </div>
            </div>
            <div className="calc-intro">数式が苦手なら、ここは読み飛ばしてOK。グラフと用語集だけでも十分わかります。年を選ぶと、その年の数字の出どころを順番に表示します。</div>
            <input className="yslider" type="range" min={1} max={p.years} step={1} value={tSel} onChange={(e) => setYr(parseInt(e.target.value))} />
            <div className="calc-cur"><b>{tSel}年目</b>の計算過程</div>

            <div className="const-box">
              <div className="const-title">毎年共通の定数</div>
              {p.useDep ? (
                <FRow name="減価償却費" note="建物の価値の目減りを、毎年いくら経費にできるか"
                  symbol={<span>D = <Frac n="建物価格" d="47" /></span>}
                  subst={<span>D = <Frac n={`${p.buildingMan.toLocaleString()}万`} d="47" /></span>}
                  result={<span>{fMan(sim.D)}円 / 年</span>} tone={C.gold} />
              ) : (
                <FRow name="減価償却費" note="今回は減価償却をしない前提"
                  symbol={<span>D = 0（経費に入れない）</span>}
                  result={<span>0円 / 年</span>} tone={C.gold} />
              )}
              {p.loanMethod === "ganri" ? (
                <FRow name="毎月のローン返済額" note="元利均等：毎月の支払い合計が一定（最初は利息が多い）"
                  symbol={<span>M = <Frac n="借入額 × 月利" d={<span>1 − (1+月利)<sup>−回数</sup></span>} /></span>}
                  subst={<span>M = <Frac n={`${fMan(sim.L0)}円 × ${(sim.monthlyRate * 100).toFixed(4)}%`} d={<span>1 − (1+{(sim.monthlyRate * 100).toFixed(4)}%)<sup>−{sim.nMonths}</sup></span>} /></span>}
                  result={<span>{yen(sim.M).toLocaleString()}円 / 月（毎月一定）</span>} tone={C.steel} />
              ) : (
                <FRow name="毎月のローン返済額" note="元金均等：元金は一定・利息は残高とともに減るので、支払いは年々下がる"
                  symbol={<span>毎月 = 元金（<Frac n="借入額" d="回数" />）＋ 残高 × 月利</span>}
                  subst={<span>元金 = <Frac n={`${fMan(sim.L0)}円`} d={`${sim.nMonths}回`} /> ＝ {yen(sim.monthlyPrincipal).toLocaleString()}円（毎月一定）</span>}
                  result={<span>初回 約{yen(sim.monthlyPrincipal + sim.L0 * sim.monthlyRate).toLocaleString()}円 → 年々減っていく</span>} tone={C.steel} />
              )}
            </div>

            <FRow name="① 実際に入る家賃" note="満室の家賃から、空室のぶんを引いた額"
              symbol={<span>R = 月家賃 × 12 × (1−空室率) × <Pow b="(1+家賃変動率)" e="t−1" /></span>}
              subst={<span>R = {p.rentMan}万 × 12 × (1−{p.vacancy}%) × <Pow b={`(1${p.rentChg >= 0 ? "+" : ""}${p.rentChg}%)`} e={tSel - 1} /></span>}
              result={<span>{fMan(R.rent)}円</span>} />

            <FRow name="② 物件の値段（その年）" note="価格変動率で増えたり減ったり"
              symbol={<span>V = 物件価格 × <Pow b="(1+価格変動率)" e="t" /></span>}
              subst={<span>V = {p.priceMan}万 × <Pow b={`(1${p.valueChg >= 0 ? "+" : ""}${p.valueChg}%)`} e={tSel} /></span>}
              result={<span>{fMan(R.V)}円</span>} />

            <FRow name="③ 毎年の費用＋税金" note="維持コストは物価で増え、固定資産税は評価替えで変わる"
              symbol={<span>OPEX = 維持コスト<Pow b="₀×(1+物価)" e="t−1" /> ＋ 固定資産税<Pow b="₀×(1+変動)" e="t−1" /></span>}
              subst={<span>OPEX = {p.opexMan}万×<Pow b={`(1+${p.inflation}%)`} e={tSel - 1} /> ＋ {p.taxMan}万×<Pow b={`(1${p.taxChg >= 0 ? "+" : ""}${p.taxChg}%)`} e={tSel - 1} /></span>}
              result={<span>{fMan(R.opex)}円（維持 {fMan(R.opexRun)}＋税 {fMan(R.propTax)}）</span>} />

            <FRow name="④ ローン返済の中身" note="返済を、利息（手数料）と元金（借金の返済）に分ける"
              symbol={<span>年間 = Σ<sub>12ヶ月</sub>（利息 ＋ 元金）</span>}
              subst={tSel <= p.term
                ? <span>毎月：利息＝残高×月利。{p.loanMethod === "gankin" ? "元金は毎月一定。" : "元金＝返済額−利息。"}返したぶん残債が減る</span>
                : <span>すでに完済</span>}
              result={<span>利息 {fMan(R.interest)}／元金 {fMan(R.principal)}／合計 {fMan(R.debt)}　→ 年末の残債 {fMan(R.loan)}円</span>} />

            <FRow name="⑤ 税金がかかる利益"
              note={p.useDep ? "ポイント：元金返済は引けない／減価償却は引ける" : "減価償却を引かないぶん、利益（＝税金）は高めに出ます"}
              symbol={p.useDep ? <span>課税所得 = R − 費用 − 利息 − 減価償却</span> : <span>課税所得 = R − 費用 − 利息</span>}
              subst={p.useDep
                ? <span>= {fMan(R.rent)} − {fMan(R.opex)} − {fMan(R.interest)} − {fMan(R.dep)}</span>
                : <span>= {fMan(R.rent)} − {fMan(R.opex)} − {fMan(R.interest)}</span>}
              result={<span>{fMan(R.taxable)}円</span>} tone={R.taxable < 0 ? C.teal : C.ink} />

            <FRow name="⑥ 払う税金" note={R.taxable < 0 ? "赤字なら、損益通算で戻ってくる（マイナス＝還付）" : "上の利益にかかる税金"}
              symbol={<span>税金 = 課税所得 × 税率</span>}
              subst={<span>= {fMan(R.taxable)} × {p.incomeTax}%</span>}
              result={<span>{fMan(R.tax)}円</span>} tone={R.tax < 0 ? C.teal : C.ink} />

            <FRow name="⑦ 手元に残る現金" note="その年に実際に残るお金（キャッシュフロー）"
              symbol={<span>CF = R − 費用 − ローン返済 − 税金</span>}
              subst={<span>= {fMan(R.rent)} − {fMan(R.opex)} − {fMan(R.debt)} − {fMan(R.tax)}</span>}
              result={<span>{fMan(R.cf)}円</span>} tone={R.cf >= 0 ? C.teal : C.red} />

            <FRow name="⑧ 純資産（持ち続けた場合）" note="売らずに持っていれば、これがあなたの取り分"
              symbol={<span>純資産 = 物件の値段 − ローン残高 ＋ たまった現金</span>}
              subst={<span>= {fMan(R.V)} − {fMan(R.loan)} ＋ {fMan(R.accumCF)}</span>}
              result={<span style={{ fontSize: 17 }}>{fYen(R.nwHold)}</span>} tone={C.steel} />

            <FRow name="⑨ 純資産（売った場合の手取り）" note="売却の費用と税金を引いた、実際の手取り"
              symbol={<span>= たまった現金 ＋（物件の値段 − 売却費 − 残ったローン − 譲渡税）</span>}
              subst={<span>譲渡益 {fMan(R.gain)} × {fPct(R.cgRate, 2)} ＝ 譲渡税 {fMan(R.cgTax)}</span>}
              result={<span style={{ fontSize: 17 }}>{fYen(R.nwReal)}</span>} tone={C.gold} />
          </div>

          <p className="disclaimer">
            ※ 概算モデルです。{p.useDep
              ? "減価償却あり（新築RC・定額法47年）で計算しています。"
              : "いまは減価償却オフで計算しています（建物の価値の目減りを経費に入れない）。個人の確定申告では減価償却は原則“必須＝強制償却”で、オフにできるのは法人などに限られる点にご注意ください。"}
            固定資産税は初年度の実額×変動率で近似（3年ごとの評価替えや、新築軽減が切れるときの段差は簡略化）。
            譲渡税は5年以内39.63%／5年超20.315%で計算。取得費は物件価格＋諸費用の概算。実際の判断は税理士など専門家にご相談ください。投資助言ではありません。
          </p>
        </main>
      </div>
    </div>
  );
}

function TT({ active, payload, label }) {
  if (!active || !payload || !payload.length) return null;
  return (
    <div style={{ background: "#fff", border: `1px solid ${C.border}`, borderRadius: 8, padding: "9px 12px", boxShadow: "0 6px 20px rgba(0,0,0,.08)", fontFamily: FONT }}>
      <div style={{ fontSize: 11, color: C.soft, marginBottom: 5 }}>{label}年目</div>
      {payload.map((e, i) => (
        <div key={i} style={{ display: "flex", justifyContent: "space-between", gap: 18, fontSize: 12.5 }}>
          <span style={{ color: e.color }}>{e.name}</span>
          <span style={{ fontWeight: 600, fontVariantNumeric: "tabular-nums" }}>{fYen(e.value)}</span>
        </div>
      ))}
    </div>
  );
}

.ctrl-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;gap:8px;}
.ctrl-label{font-size:12.5px;font-weight:500;line-height:1.4;}
.ctrl-val{display:flex;align-items:baseline;gap:3px;flex:none;}
.ctrl-val input{width:64px;text-align:right;border:none;border-bottom:1.5px solid ${C.border};background:none;font-size:15px;font-weight:700;color:${C.steel};font-variant-numeric:tabular-nums;padding:0 2px 1px;}
.ctrl-val input:focus{outline:none;border-color:${C.steel};}
.ctrl-val em{font-style:normal;font-size:11px;color:${C.faint};}
.ctrl-hint{font-size:11px;color:${C.faint};margin-top:6px;line-height:1.6;}

input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;border-radius:3px;background:${C.border};outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:${C.steel};border:2px solid ${C.card};box-shadow:0 1px 3px rgba(0,0,0,.25);cursor:pointer;}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:${C.steel};border:2px solid ${C.card};cursor:pointer;}
.switch{display:flex;align-items:center;gap:9px;font-size:12.5px;cursor:pointer;}
.switch input{width:16px;height:16px;accent-color:${C.steel};}
.seg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:2px;}
.seg-btn{font-family:inherit;cursor:pointer;border:1px solid ${C.border};background:${C.page};color:${C.soft};border-radius:8px;padding:7px 2px;font-size:12px;font-weight:600;}
.seg-btn.on{background:${C.steel};color:#fff;border-color:${C.steel};}

.info{position:relative;display:inline-flex;margin-left:5px;}
.info-btn{width:15px;height:15px;border-radius:50%;border:1px solid ${C.steelSoft};background:#fff;color:${C.steel};font-size:10px;line-height:1;cursor:pointer;font-weight:800;padding:0;display:inline-flex;align-items:center;justify-content:center;}
.info-pop{position:absolute;z-index:20;top:21px;left:0;width:235px;background:#fff;border:1px solid ${C.border};border-radius:9px;padding:10px 12px;font-size:11.5px;line-height:1.65;color:${C.ink};font-weight:400;box-shadow:0 8px 26px rgba(0,0,0,.14);text-align:left;}
@media(max-width:420px){.info-pop{width:200px;left:auto;right:0;}}

.results{display:flex;flex-direction:column;gap:15px;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;}
@media(max-width:720px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
.kpi{background:${C.card};border:1px solid ${C.border};border-radius:13px;padding:15px;position:relative;}
.kpi-label{font-size:11px;color:${C.soft};margin-bottom:7px;line-height:1.4;display:flex;align-items:center;}
.kpi-value{font-size:21px;font-weight:800;letter-spacing:-.01em;font-variant-numeric:tabular-nums;}
.kpi-sub{font-size:10.5px;color:${C.faint};margin-top:5px;line-height:1.4;}

.eventbar{display:flex;gap:8px;flex-wrap:wrap;}
.ev{font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:999px;display:inline-flex;align-items:center;}
.ev.red{background:#f6e7e2;color:${C.red};}.ev.gold{background:#f3ecde;color:${C.gold};}
.ev.teal{background:#e2efeb;color:${C.teal};}.ev.muted{background:${C.page};color:${C.faint};}
.ev .info-btn{border-color:currentColor;color:inherit;}

.panel{background:${C.card};border:1px solid ${C.border};border-radius:13px;padding:17px;}
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;}
.panel-head h3{font-size:14px;font-weight:700;margin:0;}
.legend{display:flex;align-items:center;font-size:11.5px;color:${C.soft};}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block;margin-right:5px;}
.chart-note{font-size:11.5px;color:${C.soft};line-height:1.6;margin-top:10px;padding-top:10px;border-top:1px solid ${C.grid};}

.bs{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:start;margin-top:12px;}
@media(max-width:560px){.bs{grid-template-columns:1fr;}.bs-eq{display:none;}}
.bs-col{border:1px solid ${C.border};border-radius:10px;padding:12px 14px;background:${C.page};}
.bs-side{font-size:11px;font-weight:800;color:${C.soft};letter-spacing:.03em;margin-bottom:8px;}
.bs-item{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;border-bottom:1px solid ${C.grid};font-variant-numeric:tabular-nums;gap:10px;}
.bs-item.strong{font-weight:700;color:${C.steel};}
.bs-total{display:flex;justify-content:space-between;font-size:13px;font-weight:800;padding-top:8px;margin-top:2px;font-variant-numeric:tabular-nums;gap:10px;}
.bs-eq{align-self:center;font-size:20px;color:${C.faint};font-weight:700;}
.lev{margin-top:14px;}
.lev-bar{display:flex;height:16px;border-radius:6px;overflow:hidden;border:1px solid ${C.border};}
.lev-debt{background:rgba(188,74,46,.45);}
.lev-eq{background:${C.steel};}
.lev-legend{font-size:11.5px;color:${C.soft};margin-top:6px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;}
.artic{margin-top:14px;background:${C.page};border-radius:10px;padding:12px 14px;}
.artic-title{font-size:12px;font-weight:800;color:${C.steel};margin-bottom:8px;}
.artic-eq{font-size:13px;line-height:1.8;font-variant-numeric:tabular-nums;}
.artic-eq b{color:${C.steel};}
.artic-note{font-size:11.5px;color:${C.soft};line-height:1.65;margin-top:9px;}
.bs-book{margin-top:14px;display:flex;gap:18px;flex-wrap:wrap;font-size:12.5px;font-variant-numeric:tabular-nums;color:${C.ink};align-items:baseline;}
.bs-book .lbl{color:${C.faint};margin-right:5px;font-size:11px;}
.bs-book-note{flex-basis:100%;font-size:11px;color:${C.faint};line-height:1.65;margin-top:2px;}
.panel-subtitle{font-size:12px;color:${C.soft};margin:18px 0 8px;padding-top:14px;border-top:1px solid ${C.grid};}

.gloss-toggle{font-family:inherit;background:none;border:none;color:${C.steel};font-weight:700;font-size:13px;cursor:pointer;padding:2px 0;text-align:left;}
.gloss{margin-top:14px;display:flex;flex-direction:column;}
.gloss-row{display:grid;grid-template-columns:140px 1fr;gap:14px;padding:11px 0;border-top:1px solid ${C.grid};}
@media(max-width:600px){.gloss-row{grid-template-columns:1fr;gap:3px;}}
.gloss-term{font-size:12.5px;font-weight:700;color:${C.steel};}
.gloss-def{font-size:12.5px;color:${C.soft};line-height:1.65;}

.calc{padding-bottom:20px;}
.calc-intro{font-size:11.5px;color:${C.soft};line-height:1.6;margin:2px 0 12px;background:${C.page};border-radius:9px;padding:9px 12px;}
.yearpick{display:flex;gap:6px;flex-wrap:wrap;}
.ychip{font-family:inherit;cursor:pointer;border:1px solid ${C.border};background:${C.page};color:${C.soft};border-radius:999px;padding:5px 11px;font-size:11.5px;font-weight:600;}
.ychip.on{background:${C.steel};color:#fff;border-color:${C.steel};}
.yslider{margin:4px 0 6px;}
.calc-cur{font-size:13px;color:${C.soft};margin:6px 0 14px;}
.calc-cur b{color:${C.steel};font-size:16px;font-weight:800;}

.const-box{background:${C.page};border-radius:10px;padding:4px 14px;margin-bottom:14px;}
.const-title{font-size:11px;color:${C.faint};font-weight:700;letter-spacing:.04em;padding:10px 0 2px;}

.frow{display:grid;grid-template-columns:185px 1fr;gap:14px;padding:13px 0;border-top:1px solid ${C.grid};}
.const-box .frow:first-of-type{border-top:none;}
@media(max-width:620px){.frow{grid-template-columns:1fr;gap:5px;}}
.frow-name{font-size:13px;font-weight:700;line-height:1.45;}
.frow-note{display:block;font-size:10.5px;color:${C.faint};font-weight:500;margin-top:3px;line-height:1.5;}
.frow-body{display:flex;flex-direction:column;gap:5px;}
.fline{display:flex;align-items:baseline;gap:9px;font-size:13px;line-height:1.7;}
.ftag{flex:none;width:30px;font-size:10px;color:${C.faint};font-weight:700;text-align:right;padding-top:1px;}
.ftag.eq{color:${C.ink};font-size:14px;}
.fmath{color:${C.soft};font-variant-numeric:tabular-nums;}
.fres{font-weight:700;font-variant-numeric:tabular-nums;font-size:14px;}
sup{font-size:.72em;}sub{font-size:.72em;}

.frac{display:inline-flex;flex-direction:column;text-align:center;vertical-align:middle;margin:0 2px;}
.frac .fn{padding:0 5px;}
.frac .fd{padding:1px 5px 0;border-top:1.4px solid currentColor;}

.disclaimer{font-size:11px;color:${C.faint};line-height:1.7;margin:2px;}
@media(prefers-reduced-motion:reduce){*{transition:none!important;}}
`;


    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

  </script>

  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.querySelector('#loading')) {
          root.innerHTML =
            '<div style="font-family:sans-serif;max-width:620px;margin:48px auto;padding:0 22px;color:#333;line-height:1.8">'
          + '<h2>読み込みに失敗しました</h2>'
          + '<p>このアプリは<b>初回表示時だけインターネット接続</b>が必要です（計算部品を読み込むため）。電波・Wi‑Fiを確認して、ページを再読み込みしてください。</p>'
          + '</div>';
        }
      }, 6000);
    });
  </script>
</body>
